name: UniqueUUID
main: com.instacraft.uuidguard.UniqueUuidPlugin
version: 2.0.0
api-version: '1.18'
author: Instacraft
description: Floodgate-aware username and UUID guard
softdepend:
  - floodgate
commands:
  uniqueuuid:
    description: Manage UniqueUUID identity guard
    usage: /uniqueuuid <help|status|inspect|reload>
    permission: uniqueuuid.admin
permissions:
  uniqueuuid.admin:
    description: Allows viewing identity status, inspecting stored records, and reloading the guard.
    default: op
